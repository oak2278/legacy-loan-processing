version: 0.2

phases:
  install:
    commands:
      - echo "Installing build dependencies..."
      - choco install nuget.commandline -y
      - $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
      
  pre_build:
    commands:
      - echo "Restoring NuGet packages..."
      - nuget restore LoanProcessing.Web\LoanProcessing.Web.csproj -PackagesDirectory packages
      
  build:
    commands:
      - echo "Building solution in Release configuration..."
      - msbuild LoanProcessing.Web\LoanProcessing.Web.csproj /p:Configuration=Release /p:Platform="AnyCPU" /p:DeployOnBuild=false /v:minimal
      - echo "Checking for test project..."
      - if (Test-Path "LoanProcessing.Tests\LoanProcessing.Tests.csproj") { echo "Building test project..."; nuget restore LoanProcessing.Tests\LoanProcessing.Tests.csproj -PackagesDirectory packages; msbuild LoanProcessing.Tests\LoanProcessing.Tests.csproj /p:Configuration=Release /p:Platform="AnyCPU" /v:minimal; Set-Content -Path .run_pbt -Value "true" } else { echo "Test project not found - PBT tests will be skipped" }
      
  post_build:
    commands:
      - echo "Running FsCheck property-based tests..."
      - $testResult = 0
      - |
        if (Test-Path '.run_pbt') {
          try {
            $output = & packages\xunit.runner.console.2.4.2\tools\net472\xunit.console.exe LoanProcessing.Tests\bin\Release\LoanProcessing.Tests.dll -xml test-results.xml 2>&1
            $testResult = $LASTEXITCODE
            echo $output
            [xml]$xml = Get-Content test-results.xml
            $total = [int]$xml.assemblies.assembly.total
            $failed = [int]$xml.assemblies.assembly.failed
            $passed = $total - $failed
            $timestamp = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            $buildId = if ($env:CODEBUILD_BUILD_ID) { $env:CODEBUILD_BUILD_ID } else { 'local' }
            $json = @{ TotalProperties = $total; PassedProperties = $passed; RunTimestamp = $timestamp; BuildId = $buildId } | ConvertTo-Json
            Set-Content -Path pbt-results.json -Value $json
          } catch {
            echo "PBT test execution failed: $_"
            $json = @{ TotalProperties = 5; PassedProperties = 0; RunTimestamp = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'); BuildId = if ($env:CODEBUILD_BUILD_ID) { $env:CODEBUILD_BUILD_ID } else { 'local' } } | ConvertTo-Json
            Set-Content -Path pbt-results.json -Value $json
          }
        } else {
          echo "PBT tests skipped - CreditEvaluationCalculator not yet extracted"
        }
      - echo "Packaging application for deployment..."
      - mkdir deployment-package
      - mkdir deployment-package\app
      - mkdir deployment-package\database
      - mkdir deployment-package\scripts
      
      # Copy web application files
      - echo "Copying web application files..."
      - xcopy LoanProcessing.Web\bin deployment-package\app\bin\ /E /I /Y
      - xcopy LoanProcessing.Web\Content deployment-package\app\Content\ /E /I /Y
      - xcopy LoanProcessing.Web\fonts deployment-package\app\fonts\ /E /I /Y
      - xcopy LoanProcessing.Web\Scripts deployment-package\app\Scripts\ /E /I /Y
      - xcopy LoanProcessing.Web\Views deployment-package\app\Views\ /E /I /Y
      - copy LoanProcessing.Web\Global.asax deployment-package\app\
      - copy LoanProcessing.Web\Web.config deployment-package\app\
      
      # Copy PBT results
      - echo "Copying PBT results..."
      - if (Test-Path pbt-results.json) { copy pbt-results.json deployment-package\app\ }
      
      # Copy database scripts
      - echo "Copying database scripts..."
      - xcopy database\*.sql deployment-package\database\ /E /I /Y
      
      # Copy stored procedure files from LoanProcessing.Database
      - echo "Copying stored procedure files..."
      - xcopy LoanProcessing.Database\StoredProcedures\sp_SubmitLoanApplication.sql deployment-package\database\ /Y
      - xcopy LoanProcessing.Database\StoredProcedures\sp_EvaluateCredit.sql deployment-package\database\ /Y
      - xcopy LoanProcessing.Database\StoredProcedures\sp_ProcessLoanDecision.sql deployment-package\database\ /Y
      - xcopy LoanProcessing.Database\StoredProcedures\sp_CalculatePaymentSchedule.sql deployment-package\database\ /Y
      - xcopy LoanProcessing.Database\StoredProcedures\sp_GeneratePortfolioReport.sql deployment-package\database\ /Y
      
      # Copy deployment scripts (CodeDeploy lifecycle hooks)
      - echo "Copying deployment scripts..."
      - xcopy aws-deployment\codedeploy\*.ps1 deployment-package\scripts\ /Y
      
      # Copy appspec.yml
      - echo "Copying appspec.yml..."
      - copy aws-deployment\appspec.yml deployment-package\
      
      - echo "Build and packaging completed successfully"

artifacts:
  files:
    - '**/*'
  base-directory: deployment-package
  name: loan-processing-$CODEBUILD_RESOLVED_SOURCE_VERSION

cache:
  paths:
    - 'packages/**/*'
